  wisp-snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: theia-wisp-snmp-exporter
    network_mode: host
    command:
      - --config.file=/etc/snmp_exporter/snmp.yml
      - --web.listen-address=:9117
    volumes:
      - "./docker/prometheus/snmp.yml:/etc/snmp_exporter/snmp.yml:ro"
    depends_on:
      wisp-core-01:
        condition: service_healthy
      wisp-core-02:
        condition: service_healthy
      wisp-pop-north-01:
        condition: service_healthy
      wisp-pop-south-01:
        condition: service_healthy
      wisp-ix-edge-01:
        condition: service_healthy
      wisp-tower-north-01:
        condition: service_healthy
      wisp-tower-north-02:
        condition: service_healthy
      wisp-tower-south-01:
        condition: service_healthy
      wisp-tower-south-02:
        condition: service_healthy
      wisp-dc-agg-01:
        condition: service_healthy
      wisp-ap-north-a-01:
        condition: service_healthy
      wisp-ap-north-b-01:
        condition: service_healthy
      wisp-ap-south-a-01:
        condition: service_healthy
      wisp-ap-south-b-01:
        condition: service_healthy
      wisp-cpe-north-a-01:
        condition: service_healthy
      wisp-cpe-north-a-02:
        condition: service_healthy
      wisp-cpe-north-b-01:
        condition: service_healthy
      wisp-cpe-north-b-02:
        condition: service_healthy
      wisp-cpe-south-a-01:
