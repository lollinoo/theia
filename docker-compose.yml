# =============================================================================
# Theia - Docker Compose
# =============================================================================
# Profiles:
#   dev      — Frontend + backend + PostgreSQL + Prometheus
#   test     — Backend + PostgreSQL only (for automated testing)
#   postgres — Local PostgreSQL only
#
# Usage:
#   docker compose --profile dev up --build -d
#   docker compose --profile test up -d --wait postgres
#   docker compose --profile test run --rm backend go test ./...
# =============================================================================

volumes:
  theia-data:
    name: theia-data
  theia-postgres-data:
    name: theia-postgres-data

services:
  # ---------------------------------------------------------------------------
  # Backend — Go API with Air hot-reload
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    profiles: ["dev", "test"]
    container_name: theia-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ".:/app"
      - "theia-data:/app/data"
    environment:
      - THEIA_DB_DSN=${THEIA_DB_DSN:-postgres://theia:theia@postgres:5432/theia?sslmode=disable}
      - THEIA_DATA_DIR=/app/data
      - THEIA_LISTEN_ADDR=:8080
      - THEIA_ENCRYPTION_KEY=${THEIA_ENCRYPTION_KEY:-devkey1234567890}
      - THEIA_SESSION_SECRET=${THEIA_SESSION_SECRET:-dev-session-secret-change-me-32bytes}
      - THEIA_ALLOWED_ORIGINS=${THEIA_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - THEIA_LOG_LEVEL=debug
      - THEIA_VERSION=${THEIA_VERSION:-dev}
      - GIT_COMMIT=${GIT_COMMIT:-dev}
      - BUILD_DATE=${BUILD_DATE:-dev}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/auth/me"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:17
    profiles: ["dev", "test", "postgres"]
    container_name: theia-postgres
    environment:
      - POSTGRES_DB=theia
      - POSTGRES_USER=theia
      - POSTGRES_PASSWORD=theia
    ports:
      - "5432:5432"
    volumes:
      - "theia-postgres-data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U theia -d theia"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Frontend — React + Vite dev server
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      target: dev
    profiles: ["dev"]
    container_name: theia-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - "./frontend/src:/app/src"
      - "./frontend/index.html:/app/index.html"
    environment:
      - VITE_API_URL=http://backend:8080
    depends_on:
      - backend

  # ---------------------------------------------------------------------------
  # Metrics Stack — Prometheus scraping SNMP targets through snmp_exporter
  # ---------------------------------------------------------------------------
  snmp-exporter:
    image: prom/snmp-exporter:latest
    profiles: ["dev"]
    container_name: theia-snmp-exporter
    ports:
      - "${SNMP_EXPORTER_PORT:-9116}:9116"
    volumes:
      - "./docker/prometheus/snmp.yml:/etc/snmp_exporter/snmp.yml:ro"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9116/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    profiles: ["dev"]
    container_name: theia-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - "./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "./docker/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro"
    depends_on:
      snmp-exporter:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
