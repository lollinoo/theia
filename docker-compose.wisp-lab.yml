      wisp-cpe-south-a-02:
        condition: service_healthy
      wisp-cpe-south-b-01:
        condition: service_healthy
      wisp-cpe-south-b-02:
        condition: service_healthy

  wisp-prometheus:
    image: prom/prometheus:latest
    container_name: theia-wisp-prometheus
    network_mode: host
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.listen-address=:9091
    volumes:
      - "./docker/prometheus/prometheus.wisp.yml:/etc/prometheus/prometheus.yml:ro"
    depends_on:
      - wisp-snmp-exporter

