# =============================================================================
# Theia - Production Docker Compose (GHCR Pull)
# =============================================================================
# Images pulled from ghcr.io/lollinoo/theia-{backend,frontend}
# Set THEIA_VERSION in .env.prod to the semver tag (e.g., 1.5.1)
#
# Profiles:
#   (default) -- Backend + PostgreSQL + nginx frontend
#   metrics   -- Also starts Prometheus + SNMP exporter
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#   docker compose -f docker-compose.prod.yml --env-file .env.prod --profile metrics up -d
#
# First-time setup:
#   1. Authenticate with GHCR:  echo $GHCR_PAT | docker login ghcr.io -u YOUR_USERNAME --password-stdin
#   2. Copy env file:           cp .env.prod.example .env.prod
#   3. Set THEIA_VERSION, THEIA_ENCRYPTION_KEY, THEIA_DB_DSN, and POSTGRES_PASSWORD in .env.prod
#   4. Start the stack:         docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# =============================================================================

name: theia

networks:
  theia-net:
    driver: bridge

volumes:
  theia-data:
    name: theia-data
  prometheus-data:
    name: theia-prometheus-data
  theia-prod-postgres-data:
    name: theia-prod-postgres-data

services:
  # ---------------------------------------------------------------------------
  # Backend -- Go API server (pulled from GHCR)
  # ---------------------------------------------------------------------------
  backend:
    image: ghcr.io/lollinoo/theia-backend:${THEIA_VERSION:?THEIA_VERSION must be set}
    container_name: theia-backend
    restart: unless-stopped
    networks:
      - theia-net
    volumes:
      - theia-data:/data
    environment:
      - THEIA_DEPLOYMENT_ENV=production
      - THEIA_DB_DRIVER=${THEIA_DB_DRIVER:-postgres}
      - THEIA_ALLOW_SQLITE_SMALL_INSTALL=${THEIA_ALLOW_SQLITE_SMALL_INSTALL:-}
      - THEIA_DB_PATH=${THEIA_DB_PATH:-/data/theia.db}
      - THEIA_DB_DSN=${THEIA_DB_DSN:?THEIA_DB_DSN must be set}
      - THEIA_DATA_DIR=${THEIA_DATA_DIR:-/data}
      - THEIA_LISTEN_ADDR=:${BACKEND_PORT:-8080}
      - THEIA_LOG_LEVEL=${LOG_LEVEL:-info}
      - THEIA_ENCRYPTION_KEY=${THEIA_ENCRYPTION_KEY:?THEIA_ENCRYPTION_KEY must be set}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${BACKEND_PORT:-8080}/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:17
    container_name: theia-prod-postgres
    restart: unless-stopped
    networks:
      - theia-net
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-theia}
      - POSTGRES_USER=${POSTGRES_USER:-theia}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - theia-prod-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-theia} -d ${POSTGRES_DB:-theia}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Frontend -- nginx serving compiled React SPA + API proxy (pulled from GHCR)
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/lollinoo/theia-frontend:${THEIA_VERSION:?THEIA_VERSION must be set}
    container_name: theia-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-8080}
    networks:
      - theia-net
    depends_on:
      backend:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Metrics stack -- enable with: --profile metrics
  # Edit docker/prometheus/prometheus.prod.yml to add your SNMP device IPs.
  # ---------------------------------------------------------------------------
  snmp-exporter:
    image: prom/snmp-exporter:latest
    profiles: ["metrics"]
    container_name: theia-snmp-exporter
    restart: unless-stopped
    network_mode: host
    volumes:
      - "./docker/prometheus/snmp.yml:/etc/snmp_exporter/snmp.yml:ro"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9116/metrics"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    profiles: ["metrics"]
    container_name: theia-prometheus
    restart: unless-stopped
    network_mode: host
    volumes:
      - "./docker/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro"
      - "./docker/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro"
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      snmp-exporter:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
