name: theia-wisp-lab

services:
  wisp-core-01:
    build:
      context: .
      dockerfile: docker/wisp-lab/Dockerfile
    container_name: theia-wisp-core-01
    hostname: wisp-core-01
    environment:
      - ROUTER_NAME=wisp-core-01
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.rp_filter: "0"
      net.ipv4.conf.default.rp_filter: "0"
    ports:
      - "127.0.10.21:161:161/udp"
    networks:
      wisp-core12:
        ipv4_address: 10.100.0.10
      wisp-core1-north:
        ipv4_address: 10.100.1.10
      wisp-core1-south:
        ipv4_address: 10.100.2.10
    healthcheck:
      test: ["CMD", "snmpget", "-v2c", "-c", "public", "localhost", "1.3.6.1.2.1.1.5.0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

