auths:
  public_v2:
    community: public
    security_level: noAuthNoPriv
    auth_protocol: MD5
    priv_protocol: DES
    version: 2

modules:
  if_mib:
    walk:
      - 1.3.6.1.2.1.1
      - 1.3.6.1.2.1.2
      - 1.3.6.1.2.1.31.1.1
      - 1.3.6.1.2.1.25.2.3
      - 1.3.6.1.2.1.25.3.2
      - 1.3.6.1.2.1.25.3.3
      - 1.3.6.1.2.1.47.1.1.1.1
      - 1.3.6.1.2.1.99.1.1.1
    max_repetitions: 25
    retries: 3
    timeout: 5s
    metrics:
      - name: sysDescr
        oid: 1.3.6.1.2.1.1.1
        type: DisplayString
        help: A textual description of the entity. - 1.3.6.1.2.1.1.1
      - name: sysUpTime
        oid: 1.3.6.1.2.1.1.3
        type: gauge
        help: The time in hundredths of a second since the system was last re-initialized. - 1.3.6.1.2.1.1.3
      - name: sysName
        oid: 1.3.6.1.2.1.1.5
        type: DisplayString
        help: An administratively-assigned name for this managed node. - 1.3.6.1.2.1.1.5
      - name: ifSpeed
        oid: 1.3.6.1.2.1.2.2.1.5
        type: gauge
        help: The interface bandwidth estimate in bits per second. - 1.3.6.1.2.1.2.2.1.5
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels:
              - ifIndex
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
          - labels:
              - ifIndex
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1
            type: DisplayString
      - name: ifOperStatus
        oid: 1.3.6.1.2.1.2.2.1.8
        type: gauge
        help: The current operational state of the interface. - 1.3.6.1.2.1.2.2.1.8
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels:
              - ifIndex
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
          - labels:
              - ifIndex
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1
            type: DisplayString
        enum_values:
          1: up
          2: down
          3: testing
          4: unknown
          5: dormant
          6: notPresent
          7: lowerLayerDown
      - name: ifHCInOctets
        oid: 1.3.6.1.2.1.31.1.1.1.6
        type: counter
        help: The total number of octets received on the interface. - 1.3.6.1.2.1.31.1.1.1.6
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels:
              - ifIndex
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
          - labels:
              - ifIndex
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1
            type: DisplayString
      - name: ifHCOutOctets
        oid: 1.3.6.1.2.1.31.1.1.1.10
        type: counter
        help: The total number of octets transmitted on the interface. - 1.3.6.1.2.1.31.1.1.1.10
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels:
              - ifIndex
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
          - labels:
              - ifIndex
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1
            type: DisplayString
      - name: ifHighSpeed
        oid: 1.3.6.1.2.1.31.1.1.1.15
        type: gauge
        help: The interface bandwidth estimate in units of 1,000,000 bits per second. - 1.3.6.1.2.1.31.1.1.1.15
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels:
              - ifIndex
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
          - labels:
              - ifIndex
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1
            type: DisplayString
      - name: hrStorageSize
        oid: 1.3.6.1.2.1.25.2.3.1.5
        type: gauge
        help: The size of the storage represented by this entry. - 1.3.6.1.2.1.25.2.3.1.5
        indexes:
          - labelname: hrStorageIndex
            type: gauge
        lookups:
          - labels:
              - hrStorageIndex
            labelname: hrStorageDescr
            oid: 1.3.6.1.2.1.25.2.3.1.3
            type: DisplayString
      - name: hrStorageUsed
        oid: 1.3.6.1.2.1.25.2.3.1.6
        type: gauge
        help: The amount of storage currently allocated. - 1.3.6.1.2.1.25.2.3.1.6
        indexes:
          - labelname: hrStorageIndex
            type: gauge
        lookups:
          - labels:
              - hrStorageIndex
            labelname: hrStorageDescr
            oid: 1.3.6.1.2.1.25.2.3.1.3
            type: DisplayString
      - name: hrProcessorLoad
        oid: 1.3.6.1.2.1.25.3.3.1.2
        type: gauge
        help: The average processor busy percentage over the last minute. - 1.3.6.1.2.1.25.3.3.1.2
        indexes:
          - labelname: hrDeviceIndex
            type: gauge
        lookups:
          - labels:
              - hrDeviceIndex
            labelname: hrDeviceDescr
            oid: 1.3.6.1.2.1.25.3.2.1.3
            type: DisplayString
      - name: entPhySensorValue
        oid: 1.3.6.1.2.1.99.1.1.1.4
        type: gauge
        help: The most recent measurement for the physical sensor. - 1.3.6.1.2.1.99.1.1.1.4
        indexes:
          - labelname: entPhysicalIndex
            type: gauge
        lookups:
          - labels:
              - entPhysicalIndex
            labelname: entPhysicalDescr
            oid: 1.3.6.1.2.1.47.1.1.1.1.2
            type: DisplayString
          - labels:
              - entPhysicalIndex
            labelname: entPhySensorType
            oid: 1.3.6.1.2.1.99.1.1.1.1
            type: gauge
