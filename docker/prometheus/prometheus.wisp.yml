global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: wisp-snmp
    metrics_path: /snmp
    static_configs:
      - targets:
          - 127.0.10.21
          - 127.0.10.22
          - 127.0.10.23
          - 127.0.10.24
          - 127.0.10.25
          - 127.0.10.26
          - 127.0.10.27
          - 127.0.10.28
          - 127.0.10.29
          - 127.0.10.30
          - 127.0.10.31
          - 127.0.10.32
          - 127.0.10.33
          - 127.0.10.34
          - 127.0.10.35
          - 127.0.10.36
          - 127.0.10.37
          - 127.0.10.38
          - 127.0.10.39
          - 127.0.10.40
          - 127.0.10.41
          - 127.0.10.42
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __param_module
        replacement: if_mib
      - target_label: __param_auth
        replacement: public_v2
      - source_labels: [__param_target]
        target_label: instance
      - source_labels: [__param_target]
        target_label: identity
      - target_label: __address__
        replacement: localhost:9117
