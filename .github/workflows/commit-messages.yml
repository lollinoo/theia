name: Commit Messages

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

concurrency:
  group: commit-messages-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR base branch
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --prune origin "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Validate commit messages
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          ZERO_SHA='0000000000000000000000000000000000000000'

          # Grandfather legacy commits that predate the first introduction of
          # conventional-commit enforcement in this repository.
          ENFORCEMENT_SHA=$(git log --diff-filter=A --format=%H --reverse HEAD -- .github/workflows/commit-messages.yml | head -n1)

          if [ -z "${ENFORCEMENT_SHA}" ]; then
            echo "Unable to determine the conventional-commit enforcement baseline."
            exit 1
          fi

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            RANGE_START="${PR_BASE_SHA}"
            RANGE_END="${PR_HEAD_SHA}"
          elif [ -n "${BEFORE_SHA}" ] &&
            [ "${BEFORE_SHA}" != "${ZERO_SHA}" ] &&
            git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null &&
            git merge-base --is-ancestor "${BEFORE_SHA}" "${AFTER_SHA}"; then
            RANGE_START="${BEFORE_SHA}"
            RANGE_END="${AFTER_SHA}"
          else
            git fetch --no-tags --prune origin "+refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"

            if MERGE_BASE=$(git merge-base "${AFTER_SHA}" "origin/${DEFAULT_BRANCH}" 2>/dev/null); then
              RANGE_START="${MERGE_BASE}"
            else
              RANGE_START=""
            fi

            RANGE_END="${AFTER_SHA}"
          fi

          if git merge-base --is-ancestor "${ENFORCEMENT_SHA}" "${RANGE_END}"; then
            if [ -z "${RANGE_START}" ] || ! git merge-base --is-ancestor "${ENFORCEMENT_SHA}" "${RANGE_START}"; then
              RANGE_START="${ENFORCEMENT_SHA}^"
            fi
          fi

          if [ -n "${RANGE_START}" ]; then
            RANGE="${RANGE_START}..${RANGE_END}"
          else
            RANGE="${RANGE_END}"
          fi

          echo "Validating commits in range: ${RANGE}"
          bash scripts/validate-commit-msg.sh --range "${RANGE}"
