name: CI

on:
  push:
    branches: ['**']
    tags: ['v*.*.*']
    paths-ignore:
      - '.planning/**'
      - '*.md'
      - 'docs/**'
      - 'scripts/**'
      - '.claude/**'
      - '.agents/**'
      - '.gemini/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '.planning/**'
      - '*.md'
      - 'docs/**'
      - 'scripts/**'
      - '.claude/**'
      - '.agents/**'
      - '.gemini/**'

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  backend-fast:
    name: backend-fast
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run backend-fast gate
        run: make backend-fast

  frontend-fast:
    name: frontend-fast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run frontend-fast gate
        run: make frontend-fast

  realtime-stress:
    name: realtime-stress
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run realtime-stress gate
        run: make realtime-stress

  collector-contract:
    name: collector-contract
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run collector-contract gate
        run: make collector-contract

  browser-e2e:
    name: browser-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run browser-e2e gate
        run: make browser-e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  branch-images:
    name: Branch Images
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    needs: [backend-fast, frontend-fast, realtime-stress, collector-contract, browser-e2e]
    runs-on: ubuntu-latest
    concurrency:
      group: branch-images-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Compute branch tag
        id: branch
        run: |
          TAG=$(echo "$GITHUB_REF_NAME" | sed 's|/|-|g' | sed 's|^-||' | tr '[:upper:]' '[:lower:]')
          DATED="staging-$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "dated=$DATED" >> "$GITHUB_OUTPUT"
          echo "Branch tag: $TAG"
          echo "Dated tag:  $DATED"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/lollinoo/theia-backend
          tags: |
            type=raw,value=${{ steps.branch.outputs.tag }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=${{ steps.branch.outputs.dated }},enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          build-args: |
            VERSION=${{ steps.branch.outputs.tag }}-${{ github.sha }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha,scope=backend-${{ steps.branch.outputs.tag }}
          cache-to: type=gha,mode=max,scope=backend-${{ steps.branch.outputs.tag }}

      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/lollinoo/theia-frontend
          tags: |
            type=raw,value=${{ steps.branch.outputs.tag }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=${{ steps.branch.outputs.dated }},enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./Dockerfile.frontend
          target: production
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VERSION=${{ steps.branch.outputs.tag }}-${{ github.sha }}
          cache-from: type=gha,scope=frontend-${{ steps.branch.outputs.tag }}
          cache-to: type=gha,mode=max,scope=frontend-${{ steps.branch.outputs.tag }}

  release:
    name: Release Images
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/lollinoo/theia-backend
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=staging

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/lollinoo/theia-frontend
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=staging

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./Dockerfile.frontend
          target: production
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  build-bridge:
    name: "Bridge: ${{ matrix.goos }}/${{ matrix.goarch }}"
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
            runs-on: ubuntu-latest
            cgo: "0"
            ldflags: "-s -w -H=windowsgui"
          - goos: windows
            goarch: arm64
            ext: .exe
            runs-on: ubuntu-latest
            cgo: "0"
            ldflags: "-s -w -H=windowsgui"
          - goos: linux
            goarch: amd64
            ext: ""
            runs-on: ubuntu-latest
            cgo: "0"
            ldflags: "-s -w"
          - goos: linux
            goarch: arm64
            ext: ""
            runs-on: ubuntu-latest
            cgo: "0"
            ldflags: "-s -w"
          - goos: darwin
            goarch: amd64
            ext: ""
            runs-on: macos-latest
            cgo: "1"
            ldflags: "-s -w"
          - goos: darwin
            goarch: arm64
            ext: ""
            runs-on: macos-latest
            cgo: "1"
            ldflags: "-s -w"
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build bridge binary
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bridge_binaries
          go build -ldflags="${{ matrix.ldflags }}" -o "bridge_binaries/winbox-bridge-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" ./cmd/winbox-bridge/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: bridge_binaries/winbox-bridge-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
