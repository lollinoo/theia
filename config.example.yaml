# =============================================================================
# MikroTik Theia — Bootstrap Configuration
# =============================================================================
# This file contains startup/bootstrap settings only.
# Runtime settings (Prometheus URL, polling interval, Grafana URL, etc.)
# are stored in the primary database and editable via the API.
#
# All values can be overridden with environment variables:
#   THEIA_LISTEN_ADDR, THEIA_DB_DSN, THEIA_DATA_DIR, THEIA_LOG_LEVEL,
#   THEIA_BRIDGE_BINARIES_DIR, THEIA_DEPLOYMENT_ENV, THEIA_SESSION_SECRET,
#   THEIA_SESSION_TTL_MINUTES, THEIA_PASSWORD_RESET_TTL_MINUTES,
#   THEIA_METRICS_TOKEN, THEIA_ALLOWED_ORIGINS
# =============================================================================

# Address and port the HTTP server listens on.
# Default: ":8080"
listen_addr: ":8080"

# PostgreSQL DSN. Required.
# DSN shape: postgres://<postgres-user>:<postgres-password>@<postgres-host>:5432/<postgres-db>?sslmode=disable
db_dsn: ""

# Local app data directory used for known_hosts and backup files.
# Default: "./data"
data_dir: "./data"

# Optional directory containing pre-built Bridge Connector binaries.
# Leave empty to disable connector downloads from User Settings.
bridge_binaries_dir: ""

# Set to production or staging to require secret validation.
deployment_env: ""

# Password-session signing and token hashing secret. Required for staging and production.
# Keep this blank in tracked files and provide it through local env or secrets.
session_secret: ""

# Session TTL in minutes. Zero uses the application default.
session_ttl_minutes: 0

# Password reset token TTL in minutes. Zero uses the application default.
password_reset_ttl_minutes: 0

# Dedicated bearer token for /metrics. Required for staging and production.
metrics_token: ""

# Optional exact browser origins allowed to reach REST/WebSocket endpoints.
# Same-host requests are always allowed. Include LAN/IP origins used by browsers.
# Env form example:
# THEIA_ALLOWED_ORIGINS=http://localhost:3000,http://192.168.1.30:3000,https://theia.example.com
allowed_origins: []

# Log verbosity: debug, info, warn, error
# Default: "info"
log_level: "info"
