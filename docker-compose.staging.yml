# =============================================================================
# Theia - Staging Docker Compose (GHCR Pull)
# =============================================================================
# Profiles:
#   (default) -- Backend + PostgreSQL + frontend
#
# Usage:
#   docker compose -f docker-compose.staging.yml --env-file .env.staging up -d
#   IMAGE_TAG=v1.9.0 docker compose -f docker-compose.staging.yml --env-file .env.staging up -d
#
# First-time setup:
#   1. Optional GHCR login if authenticated pulls are needed for rate limits:
#      echo $GHCR_PAT | docker login ghcr.io -u YOUR_USERNAME --password-stdin
#   2. Copy env file:           cp .env.staging.example .env.staging
#   3. Set THEIA_ENCRYPTION_KEY_ID, THEIA_ENCRYPTION_KEYS, THEIA_SESSION_SECRET, THEIA_METRICS_TOKEN, THEIA_DB_DSN, and POSTGRES_PASSWORD in .env.staging
#   4. Start the stack:         docker compose -f docker-compose.staging.yml --env-file .env.staging up -d
# =============================================================================

name: theia-staging

networks:
  theia-staging-net:
    driver: bridge

volumes:
  theia-staging-data:
    name: theia-staging-data
  theia-staging-postgres-data:
    name: theia-staging-postgres-data

services:
  # ---------------------------------------------------------------------------
  # Backend — Pre-built Go binary from GHCR
  # ---------------------------------------------------------------------------
  backend:
    image: ghcr.io/lollinoo/theia-backend:${IMAGE_TAG:-master}
    container_name: theia-staging-backend
    restart: unless-stopped
    networks:
      - theia-staging-net
    volumes:
      - theia-staging-data:/data
    environment:
      - THEIA_DEPLOYMENT_ENV=staging
      - THEIA_DB_DSN=${THEIA_DB_DSN:?THEIA_DB_DSN must be set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - THEIA_DATA_DIR=${THEIA_DATA_DIR:-/data}
      - THEIA_LISTEN_ADDR=:${BACKEND_PORT:-8081}
      - THEIA_LOG_LEVEL=${LOG_LEVEL:-info}
      - THEIA_ENCRYPTION_KEY_ID=${THEIA_ENCRYPTION_KEY_ID:-}
      - THEIA_ENCRYPTION_KEYS=${THEIA_ENCRYPTION_KEYS:-}
      - THEIA_ENCRYPTION_KEY=${THEIA_ENCRYPTION_KEY:-}
      - THEIA_SESSION_SECRET=${THEIA_SESSION_SECRET:?THEIA_SESSION_SECRET must be set}
      - THEIA_METRICS_TOKEN=${THEIA_METRICS_TOKEN:?THEIA_METRICS_TOKEN must be set}
      - THEIA_ALLOWED_ORIGINS=${THEIA_ALLOWED_ORIGINS:-}
      - THEIA_BRIDGE_BINARIES_DIR=${THEIA_BRIDGE_BINARIES_DIR:-/data/bridge_binaries}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf \"http://localhost:${BACKEND_PORT:-8081}/api/v1/auth/me\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:17
    container_name: theia-staging-postgres
    restart: unless-stopped
    networks:
      - theia-staging-net
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-theia}
      - POSTGRES_USER=${POSTGRES_USER:-theia}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - theia-staging-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-theia} -d ${POSTGRES_DB:-theia}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Frontend — Pre-built nginx + React SPA from GHCR
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/lollinoo/theia-frontend:${IMAGE_TAG:-master}
    container_name: theia-staging-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-8081}
    networks:
      - theia-staging-net
    depends_on:
      backend:
        condition: service_healthy
