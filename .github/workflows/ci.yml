name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      target_environment:
        description: Image channel to publish
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Optional additional image tag
        required: false
        type: string

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      browser_e2e: ${{ steps.filter.outputs.browser_e2e }}
      bridge: ${{ steps.filter.outputs.bridge }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          backend=false
          frontend=false
          browser_e2e=false
          bridge=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            backend=true
            frontend=true
            browser_e2e=true
            bridge=true
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" == "0000000000000000000000000000000000000000" ]]; then
              base="$(git merge-base origin/master "$head")"
            fi
          fi

          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            git diff --name-only "$base" "$head" > /tmp/theia-changed-files

            while IFS= read -r path; do
              case "$path" in
                cmd/*|internal/*|go.mod|go.sum|config.example.yaml|Dockerfile|docker-compose*.yml|Makefile|scripts/*.sh|scripts/*.ps1|.env*.example)
                  backend=true
                  browser_e2e=true
                  ;;
              esac

              case "$path" in
                frontend/*|Dockerfile.frontend)
                  frontend=true
                  browser_e2e=true
                  ;;
              esac

              case "$path" in
                cmd/winbox-bridge/*|scripts/build-winbox-bridge.ps1|scripts/test-build-winbox-bridge-safety.ps1|Makefile|go.mod|go.sum|.github/workflows/ci.yml)
                  bridge=true
                  ;;
              esac

              case "$path" in
                .github/workflows/ci.yml)
                  backend=true
                  frontend=true
                  browser_e2e=true
                  ;;
              esac
            done < /tmp/theia-changed-files
          fi

          {
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "browser_e2e=$browser_e2e"
            echo "bridge=$bridge"
          } >> "$GITHUB_OUTPUT"

  backend-fast:
    name: backend-fast
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run backend-fast gate
        run: make backend-fast

  frontend-fast:
    name: frontend-fast
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run frontend-fast quality gate
        run: make frontend-fast

  browser-e2e:
    name: browser-e2e
    needs: changes
    if: needs.changes.outputs.browser_e2e == 'true' && (github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: theia
          POSTGRES_PASSWORD: theia
          POSTGRES_DB: theia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U theia -d theia"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      THEIA_E2E_DB_DSN: postgres://theia:theia@127.0.0.1:5432/theia?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run browser-e2e gate
        run: make browser-e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  build-bridge:
    name: "Bridge: ${{ matrix.goos }}/${{ matrix.goarch }}"
    needs: changes
    if: needs.changes.outputs.bridge == 'true'
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
            runs-on: ubuntu-latest
            cgo: '0'
            ldflags: -s -w -H=windowsgui
          - goos: windows
            goarch: arm64
            ext: .exe
            runs-on: ubuntu-latest
            cgo: '0'
            ldflags: -s -w -H=windowsgui
          - goos: linux
            goarch: amd64
            ext: ''
            runs-on: ubuntu-latest
            cgo: '0'
            ldflags: -s -w
          - goos: linux
            goarch: arm64
            ext: ''
            runs-on: ubuntu-latest
            cgo: '0'
            ldflags: -s -w
          - goos: darwin
            goarch: amd64
            ext: ''
            runs-on: macos-latest
            cgo: '1'
            ldflags: -s -w
          - goos: darwin
            goarch: arm64
            ext: ''
            runs-on: macos-latest
            cgo: '1'
            ldflags: -s -w
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build bridge binary
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bridge_binaries
          go build -ldflags="${{ matrix.ldflags }}" -o "bridge_binaries/winbox-bridge-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" ./cmd/winbox-bridge/

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: winbox-bridge-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bridge_binaries/winbox-bridge-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  branch-images:
    name: Branch Images
    if: ${{ always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    needs: [changes, backend-fast, frontend-fast, browser-e2e, build-bridge]
    runs-on: ubuntu-latest
    concurrency:
      group: branch-images-${{ github.ref }}-${{ github.event.inputs.target_environment || 'branch' }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: image
        shell: bash
        run: |
          set -euo pipefail
          raw_ref="${GITHUB_REF_NAME:-manual}"
          sanitized="$(echo "$raw_ref" | tr '[:upper:]' '[:lower:]' | sed -E 's|[^a-z0-9_.-]+|-|g; s|^-+||; s|-+$||')"
          if [[ -z "$sanitized" ]]; then
            sanitized="manual"
          fi
          short_sha="${GITHUB_SHA::7}"
          custom_tag="$(echo "${{ github.event.inputs.image_tag || '' }}" | tr '[:upper:]' '[:lower:]' | sed -E 's|[^a-z0-9_.-]+|-|g; s|^-+||; s|-+$||')"
          {
            echo "branch_tag=$sanitized"
            echo "sha_tag=branch-${sanitized}-sha-${short_sha}"
            echo "custom_tag=$custom_tag"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/lollinoo/theia-backend
          tags: |
            type=raw,value=${{ steps.image.outputs.branch_tag }},enable=${{ github.event_name == 'push' }}
            type=raw,value=${{ steps.image.outputs.sha_tag }},enable=${{ github.event_name == 'push' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.event.inputs.target_environment == 'staging' }}
            type=raw,value=production,enable=${{ github.ref == 'refs/heads/production' || github.event.inputs.target_environment == 'production' }}
            type=raw,value=${{ steps.image.outputs.custom_tag }},enable=${{ steps.image.outputs.custom_tag != '' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend-${{ steps.image.outputs.branch_tag }}
          cache-to: type=gha,mode=max,scope=backend-${{ steps.image.outputs.branch_tag }}

      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/lollinoo/theia-frontend
          tags: |
            type=raw,value=${{ steps.image.outputs.branch_tag }},enable=${{ github.event_name == 'push' }}
            type=raw,value=${{ steps.image.outputs.sha_tag }},enable=${{ github.event_name == 'push' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.event.inputs.target_environment == 'staging' }}
            type=raw,value=production,enable=${{ github.ref == 'refs/heads/production' || github.event.inputs.target_environment == 'production' }}
            type=raw,value=${{ steps.image.outputs.custom_tag }},enable=${{ steps.image.outputs.custom_tag != '' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./Dockerfile.frontend
          target: production
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend-${{ steps.image.outputs.branch_tag }}
          cache-to: type=gha,mode=max,scope=frontend-${{ steps.image.outputs.branch_tag }}
