# =============================================================================
# MikroTik Theia - Docker Compose
# =============================================================================
# Profiles:
#   dev  — Full stack: backend + frontend + SNMP simulators
#   test — Backend + SNMP simulators only (for automated testing)
#
# Usage:
#   docker compose --profile dev up --build -d
#   docker compose --profile test run --rm backend go test ./...
# =============================================================================

networks:
  theia-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.10.0/24
          gateway: 172.28.10.1

volumes:
  theia-data:
    name: theia-data

services:
  # ---------------------------------------------------------------------------
  # Backend — Go API with Air hot-reload
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    profiles: ["dev", "test"]
    container_name: theia-backend
    ports:
      - "8080:8080"
    volumes:
      - ".:/app"
      - "theia-data:/app/data"
    environment:
      - THEIA_DB_PATH=/app/data/theia.db
      - THEIA_LISTEN_ADDR=:8080
      - CGO_ENABLED=1
    networks:
      - theia-net
    depends_on:
      snmp-router:
        condition: service_healthy
      snmp-switch:
        condition: service_healthy
      snmp-ap:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Frontend — React + Vite dev server
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    profiles: ["dev"]
    container_name: theia-frontend
    ports:
      - "3000:3000"
    volumes:
      - "./frontend/src:/app/src"
      - "./frontend/index.html:/app/index.html"
    environment:
      - VITE_API_URL=http://backend:8080
    networks:
      - theia-net
    depends_on:
      - backend

  # ---------------------------------------------------------------------------
  # SNMP Simulators — 3 devices forming Router <-> Switch <-> AP topology
  # ---------------------------------------------------------------------------
  snmp-router:
    build:
      context: ./docker/snmp
      dockerfile: Dockerfile.snmpd
    profiles: ["dev", "test"]
    container_name: theia-snmp-router
    volumes:
      - "./docker/snmp/router:/etc/snmp:ro"
    ports:
      - "10161:161/udp"
    networks:
      theia-net:
        ipv4_address: 172.28.10.10
    healthcheck:
      test: ["CMD", "snmpget", "-v2c", "-c", "public", "localhost", "1.3.6.1.2.1.1.1.0"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  snmp-switch:
    build:
      context: ./docker/snmp
      dockerfile: Dockerfile.snmpd
    profiles: ["dev", "test"]
    container_name: theia-snmp-switch
    volumes:
      - "./docker/snmp/switch:/etc/snmp:ro"
    ports:
      - "10162:161/udp"
    networks:
      theia-net:
        ipv4_address: 172.28.10.11
    healthcheck:
      test: ["CMD", "snmpget", "-v2c", "-c", "public", "localhost", "1.3.6.1.2.1.1.1.0"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  snmp-ap:
    build:
      context: ./docker/snmp
      dockerfile: Dockerfile.snmpd
    profiles: ["dev", "test"]
    container_name: theia-snmp-ap
    volumes:
      - "./docker/snmp/ap:/etc/snmp:ro"
    ports:
      - "10163:161/udp"
    networks:
      theia-net:
        ipv4_address: 172.28.10.12
    healthcheck:
      test: ["CMD", "snmpget", "-v2c", "-c", "public", "localhost", "1.3.6.1.2.1.1.1.0"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
