# =============================================================================
# MikroTik Theia — Bootstrap Configuration
# =============================================================================
# This file contains startup/bootstrap settings only.
# Runtime settings (Prometheus URL, polling interval, Grafana URL, etc.)
# are stored in the primary database and editable via the API.
#
# All values can be overridden with environment variables:
#   THEIA_DB_DRIVER, THEIA_LISTEN_ADDR, THEIA_DB_PATH, THEIA_DB_DSN,
#   THEIA_DATA_DIR, THEIA_LOG_LEVEL, THEIA_BRIDGE_BINARIES_DIR
# =============================================================================

# Database driver: postgres or sqlite.
# PostgreSQL is the standard backend for development, staging, and production.
# SQLite is supported only for demo, lab, or very small installs with
# THEIA_ALLOW_SQLITE_SMALL_INSTALL=true.
# Default: "postgres"
db_driver: "postgres"

# Address and port the HTTP server listens on.
# Default: ":8080"
listen_addr: ":8080"

# Path to the SQLite database file.
# Used only when db_driver=sqlite.
# Default: "./data/theia.db"
db_path: "./data/theia.db"

# PostgreSQL DSN. Required when db_driver=postgres.
# DSN shape: postgres://<postgres-user>:<postgres-password>@<postgres-host>:5432/<postgres-db>?sslmode=disable
db_dsn: ""

# Local app data directory used for known_hosts and backup files.
# Default: "./data"
data_dir: "./data"

# Optional directory containing pre-built bridge binaries.
# Leave empty to disable bridge downloads.
bridge_binaries_dir: ""

# Log verbosity: debug, info, warn, error
# Default: "info"
log_level: "info"
